<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#1239a0"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#ff9a00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow top -->
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)" opacity="0.3"/>
  <ellipse cx="100" cy="30" rx="80" ry="30" fill="white" opacity="0.06"/>

  <!-- Document base shape -->
  <rect x="52" y="38" width="78" height="100" rx="8" fill="white" opacity="0.12"/>
  <rect x="56" y="42" width="70" height="92" rx="6" fill="white" opacity="0.10"/>

  <!-- Document lines (resume lines) -->
  <rect x="66" y="58" width="42" height="5" rx="2.5" fill="white" opacity="0.9"/>
  <rect x="66" y="70" width="34" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
  <rect x="66" y="80" width="38" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
  <rect x="66" y="90" width="30" height="3.5" rx="1.75" fill="white" opacity="0.40"/>
  <rect x="66" y="100" width="36" height="3.5" rx="1.75" fill="white" opacity="0.40"/>
  <rect x="66" y="110" width="28" height="3.5" rx="1.75" fill="white" opacity="0.30"/>

  <!-- Score circle - bottom right of document, overlapping -->
  <circle cx="130" cy="128" r="32" fill="#0a1628" opacity="0.85"/>
  <circle cx="130" cy="128" r="32" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  
  <!-- Score arc track -->
  <circle cx="130" cy="128" r="24" fill="none" stroke="white" stroke-width="4" opacity="0.10" stroke-dasharray="150" stroke-dashoffset="0"/>
  <!-- Score arc fill (87%) -->
  <circle cx="130" cy="128" r="24" fill="none" stroke="url(#sparkGrad)" stroke-width="4" 
    stroke-dasharray="130 150" stroke-dashoffset="37" 
    stroke-linecap="round"
    transform="rotate(-90 130 128)" filter="url(#glow)"/>
  
  <!-- Score number -->
  <text x="130" y="133" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
    font-size="16" font-weight="800" fill="white">87</text>

  <!-- Orange spark / lightning bolt accent top right -->
  <g filter="url(#glow)">
    <path d="M148 42 L140 58 L147 58 L139 76 L158 54 L149 54 Z" fill="url(#sparkGrad)"/>
  </g>

  <!-- Subtle border -->
  <rect width="200" height="200" rx="44" fill="none" stroke="white" stroke-width="1.5" opacity="0.12"/>
</svg>
